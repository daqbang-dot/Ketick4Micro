<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK4MICRO - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg-main: #020107;
            --card-bg: rgba(77, 48, 255, 0.05);
            --accent: #CB7CFD;
            --accent-gradient: linear-gradient(135deg, #4D30FF 0%, #CB7CFD 100%);
            --text-main: #FFFFFF;
            --text-muted: #94a3b8;
            --border-color: rgba(203, 124, 253, 0.1);
            --input-bg: #0f0e17;
        }

        :root.light-mode {
            --bg-main: #FFFFFF;
            --card-bg: rgba(255, 83, 0, 0.05);
            --accent: #FF5300;
            --accent-gradient: linear-gradient(135deg, #1B0B03 0%, #FF5300 100%);
            --text-main: #130600;
            --text-muted: #64748b;
            --border-color: rgba(255, 83, 0, 0.2);
            --input-bg: #f8fafc;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
        }

        .gradient-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white !important;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-primary:hover { transform: scale(1.02); opacity: 0.9; }

        input, textarea {
            background-color: var(--input-bg) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border-color) !important;
            outline: none;
        }
        
        .text-accent { color: var(--accent); }
        .tab-btn { color: var(--text-muted); }
        .active-tab { 
            background: var(--accent-gradient); 
            color: white !important; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold gradient-text text-accent">KETICK4MICRO</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleTheme()" class="glass-card p-2 shadow-lg">
                <span id="theme-icon">🌙</span>
            </button>
            <button onclick="openSettings()" class="glass-card p-2 shadow-lg">
                <span>⚙️</span>
            </button>
        </div>
    </header>

    <nav class="flex gap-2 mb-6 bg-white/5 p-1 rounded-2xl glass-card">
        <button onclick="switchTab('tab-catalog')" class="tab-btn flex-1 py-3 rounded-xl font-bold text-sm transition active-tab" id="btn-catalog">Catalog</button>
        <button onclick="switchTab('tab-pos')" class="tab-btn flex-1 py-3 rounded-xl font-bold text-sm transition" id="btn-pos">POS & Bill</button>
        <button onclick="switchTab('tab-inventory')" class="tab-btn flex-1 py-3 rounded-xl font-bold text-sm transition" id="btn-inventory">Inventory</button>
    </nav>

    <div id="settings-page" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden overflow-y-auto p-6">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-accent">Business Settings</h2>
                <button onclick="closeSettings()" class="text-2xl">✕</button>
            </div>
            <div class="space-y-6">
                <div class="glass-card p-6 border-dashed border-2 border-accent/20 text-center">
                    <p class="text-xs mb-4 opacity-60 uppercase tracking-widest">Company Logo</p>
                    <div class="mb-4 flex justify-center">
                        <img id="logo-preview" src="https://via.placeholder.com/100" class="h-20 w-auto object-contain bg-white/10 p-2 rounded">
                    </div>
                    <input type="file" id="biz-logo" onchange="previewLogo(this)" class="hidden">
                    <label for="biz-logo" class="btn-primary px-6 py-2 rounded-xl text-sm font-bold cursor-pointer inline-block">Pick Image</label>
                </div>
                <div class="grid grid-cols-1 gap-4">
                    <input type="text" id="biz-name" placeholder="Business Name" class="p-4 rounded-2xl w-full">
                    <textarea id="biz-address" placeholder="Business Address" class="p-4 rounded-2xl w-full h-24"></textarea>
                    <input type="text" id="biz-phone" placeholder="Phone Number" class="p-4 rounded-2xl w-full">
                </div>
                <div class="glass-card p-6">
                    <h3 class="text-sm font-bold mb-4 opacity-70">Payment Information</h3>
                    <div class="grid grid-cols-1 gap-4">
                        <input type="text" id="biz-bank" placeholder="Bank Name (e.g. Maybank)" class="p-4 rounded-2xl w-full">
                        <input type="text" id="biz-acc-no" placeholder="Account Number" class="p-4 rounded-2xl w-full">
                        <input type="text" id="biz-acc-name" placeholder="Account Holder Name" class="p-4 rounded-2xl w-full">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full btn-primary py-4 rounded-2xl font-bold shadow-xl">SAVE SETTINGS</button>
                <div class="h-10"></div>
            </div>
        </div>
    </div>

    <div id="tab-catalog" class="tab-content">
        <div class="mb-4">
            <input type="text" onkeyup="renderCatalog(this.value)" placeholder="Search product..." class="w-full p-3 rounded-xl glass-card border-none">
        </div>
        <div id="catalog-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <div id="tab-pos" class="tab-content hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <h2 class="text-lg mb-3 opacity-70">Quick Select</h2>
                <div id="pos-select-list" class="grid grid-cols-3 md:grid-cols-4 gap-2"></div>
            </div>
            <div class="glass-card p-6 h-fit sticky top-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-sm">Current Bill</h2>
                    <span class="text-accent font-mono font-bold" id="next-bill-no-display">#1001</span>
                </div>
                <div id="cart-items" class="space-y-3 mb-6 min-h-[150px] max-h-[300px] overflow-y-auto border-b border-white/10 pb-4"></div>
                <div class="flex justify-between mb-4 font-bold text-xl text-accent">
                    <span>Total</span>
                    <span id="total-price">RM 0.00</span>
                </div>
                <div class="space-y-2">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="processTransaction('QUOTATION')" class="border border-accent text-accent py-2 rounded-lg text-xs hover:bg-accent/10 transition">Quotation</button>
                        <button onclick="processTransaction('INVOICE')" class="border border-blue-500 text-blue-500 py-2 rounded-lg text-xs hover:bg-blue-500/10 transition">Invoice</button>
                    </div>
                    <button onclick="processTransaction('RECEIPT')" class="w-full btn-primary py-4 rounded-xl font-bold shadow-lg">CONFIRM RECEIPT</button>
                    <button onclick="cancelBill()" class="w-full text-xs opacity-50 py-2">Cancel Transaction</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-inventory" class="tab-content hidden">
        <div class="glass-card p-6 mb-6">
            <h2 class="font-bold mb-4">Add New Product</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="p-name" placeholder="Product Name" class="p-3 rounded-xl">
                <input type="number" id="p-price" placeholder="Price (RM)" class="p-3 rounded-xl">
                <input type="number" id="p-qty" placeholder="Initial Stock" class="p-3 rounded-xl">
                <input type="file" id="p-img" class="text-xs pt-2 cursor-pointer">
            </div>
            <button onclick="addNewProduct()" class="w-full btn-primary mt-4 py-3 rounded-xl font-bold">Save to Inventory</button>
        </div>
        <div id="inventory-list" class="space-y-2"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>

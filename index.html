<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK4MICRO - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Default: Dark Mode (Cosmic) */
        :root {
            --bg-main: #020107;
            --card-bg: rgba(77, 48, 255, 0.05);
            --accent: #CB7CFD;
            --accent-gradient: linear-gradient(135deg, #4D30FF 0%, #CB7CFD 100%);
            --text-main: #FFFFFF;
            --text-muted: #94a3b8;
            --border-color: rgba(203, 124, 253, 0.1);
            --input-bg: #0f0e17;
        }

        /* Light Mode (Signal Orange) */
        :root.light-mode {
            --bg-main: #FFFFFF;
            --card-bg: rgba(255, 83, 0, 0.05);
            --accent: #FF5300;
            --accent-gradient: linear-gradient(135deg, #1B0B03 0%, #FF5300 100%);
            --text-main: #130600;
            --text-muted: #64748b;
            --border-color: rgba(255, 83, 0, 0.2);
            --input-bg: #f8fafc;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
        }

        .gradient-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white !important;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-primary:hover { transform: scale(1.02); opacity: 0.9; }

        input, textarea {
            background-color: var(--input-bg) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border-color) !important;
            outline: none;
        }
        
        .text-accent { color: var(--accent); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-bold gradient-text text-accent">KETICK4MICRO</h1>
            <p class="text-xs var(--text-muted)">Micro POS & Stock System</p>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="glass-card p-3 hover:scale-110 transition shadow-lg">
                <span id="theme-icon">🌙</span>
            </button>

            <div id="bill-display" class="glass-card px-6 py-3 text-sm">
                Next No: <span id="next-bill-no" class="text-accent font-mono text-lg font-bold">#1001</span>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2">
            <h2 class="text-xl mb-4 font-semibold flex items-center">
                <span class="w-2 h-2 bg-accent rounded-full mr-2" style="background-color: var(--accent)"></span> 
                Product Catalog
            </h2>
            <div id="catalog" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                </div>
        </div>

        <div class="glass-card p-6 h-fit sticky top-8">
            <h2 class="text-xl mb-4 font-semibold">Current Bill</h2>
            <div id="cart-items" class="space-y-3 mb-6 min-h-[150px] max-h-[400px] overflow-y-auto">
                </div>
            
            <div class="border-t border-gray-800 pt-4">
                <div class="flex justify-between mb-4">
                    <span style="color: var(--text-muted)">Total Amount</span>
                    <span id="total-price" class="font-bold text-2xl text-accent">RM 0.00</span>
                </div>
                
                <div class="space-y-2">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="processTransaction('QUOTATION')" class="border border-accent text-accent py-2 rounded-lg hover:bg-accent/10 transition text-sm">Quotation</button>
                        <button onclick="processTransaction('INVOICE')" class="border border-blue-500 text-blue-500 py-2 rounded-lg hover:bg-blue-500/10 transition text-sm">Invoice</button>
                    </div>
                    <button onclick="processTransaction('RECEIPT')" class="w-full btn-primary py-4 rounded-xl font-bold text-lg shadow-lg">
                        CONFIRM & RECEIPT
                    </button>
                    <button onclick="cancelBill()" class="w-full text-sm hover:text-red-500 transition" style="color: var(--text-muted)">
                        Cancel Transaction
                    </button>
                </div>
            </div>
        </div>
    </div>

    <section class="mt-12 glass-card p-8 border-t-4" style="border-top-color: var(--accent)">
        <h2 class="text-xl font-bold mb-6 flex items-center">
            <span class="w-2 h-6 mr-3 rounded" style="background-color: var(--accent)"></span> 
            Inventory Management
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <input type="text" id="p-name" placeholder="Product Name" class="p-3 rounded-xl">
            <input type="number" id="p-price" placeholder="Selling Price (RM)" class="p-3 rounded-xl">
            <input type="number" id="p-qty" placeholder="Current Stock" class="p-3 rounded-xl">
            <input type="file" id="p-img" class="text-xs pt-2 cursor-pointer" style="color: var(--text-muted)">
        </div>
        <textarea id="p-desc" placeholder="Product Description..." class="w-full mt-4 p-3 rounded-xl h-20"></textarea>
        <div class="mt-4 flex justify-end">
            <button onclick="addNewProduct()" class="btn-primary px-10 py-3 rounded-xl font-bold">
                Add to Stock
            </button>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>

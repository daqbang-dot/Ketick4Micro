<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK4MICRO - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020107; /* Space Black */
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(77, 48, 255, 0.05); /* Midnight Purple low opacity */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(203, 124, 253, 0.1); /* Cosmic Pink border */
            border-radius: 1.5rem;
        }
        .gradient-text {
            background: linear-gradient(90deg, #CB7CFD, #4D30FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4D30FF 0%, #CB7CFD 100%);
            transition: transform 0.2s;
        }
        .btn-primary:hover { transform: scale(1.05); }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-bold gradient-text">KETICK4MICRO</h1>
        <div id="bill-display" class="glass-card px-4 py-2 text-sm">
            Next Bill: <span id="next-bill-no" class="text-pink-400 font-mono">#1001</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2">
            <h2 class="text-xl mb-4 font-semibold">Product Catalog</h2>
            <div id="catalog" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                </div>
        </div>

        <div class="glass-card p-6 h-fit">
            <h2 class="text-xl mb-4 font-semibold">Current Bill</h2>
            <div id="cart-items" class="space-y-4 mb-6 min-h-[200px]">
                <p class="text-gray-500 text-sm italic">No items selected...</p>
            </div>
            
            <div class="border-t border-gray-800 pt-4">
                <div class="flex justify-between mb-2">
                    <span>Total</span>
                    <span id="total-price" class="font-bold text-xl">RM 0.00</span>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="cancelBill()" class="bg-gray-800 py-3 rounded-xl hover:bg-red-900 transition">Cancel</button>
                    <button onclick="checkout()" class="btn-primary py-3 rounded-xl font-bold">Receipt</button>
                </div>
            </div>
        </div>

    </div>

    <section class="mt-12 glass-card p-8">
        <h2 class="text-xl mb-4">Add New Stock</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input type="text" id="p-name" placeholder="Product Name" class="bg-black border border-gray-700 p-2 rounded">
            <input type="number" id="p-price" placeholder="Price (RM)" class="bg-black border border-gray-700 p-2 rounded">
            <input type="number" id="p-qty" placeholder="Initial Qty" class="bg-black border border-gray-700 p-2 rounded">
            <button onclick="addNewProduct()" class="btn-primary rounded p-2">Upload Stock</button>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>

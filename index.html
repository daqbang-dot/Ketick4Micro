<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KETICK OS - Flux Premium</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="icon-001.png">
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        primary: '#00E5FF', /* Ditukar ke Flux Cyan untuk butang asal */
                        primaryHover: '#00B8CC',
                        indigo: '#B000FF',  /* Ditukar ke Flux Purple */
                        lime: '#39FF14',    
                        orange: '#FF5722',  
                        fluxCyan: '#00E5FF',
                        fluxPurple: '#B000FF',
                        fluxNeon: '#39FF14',
                        darkBg: '#050505',
                        darkCard: 'rgba(20, 20, 25, 0.6)',
                        darkBorder: 'rgba(255, 255, 255, 0.1)'
                    }
                }
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="p-0 mx-auto max-w-lg min-h-screen relative text-gray-200">
    
    <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[99999] flex flex-col gap-2 pointer-events-none w-full max-w-xs px-4"></div>

    <div class="flux-bg"></div>

    <header class="glass-panel sticky top-0 z-50 px-4 py-3 border-b border-white/5 rounded-b-2xl mb-4 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
        <div class="flex justify-between items-center mb-2">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-fluxNeon animate-pulse shadow-[0_0_8px_#39FF14]"></div>
                <h1 id="secret-trigger" class="text-xl font-extrabold tracking-tighter text-white uppercase flex items-baseline gap-1">
                    KETICK <span class="text-fluxCyan font-mono text-[10px] tracking-widest font-normal">CORE</span>
                </h1>
            </div>
            
            <div class="flex gap-2">
                <button onclick="openPricingPage()" class="glass-input px-3 py-1.5 rounded-lg hover:border-fluxCyan transition text-[9px] font-bold uppercase tracking-widest text-fluxCyan flex items-center gap-1">
                    <span class="text-xs">⚡</span> Naik Taraf
                </button>
                <button onclick="openAccountPage()" class="glass-input p-2 rounded-lg hover:border-fluxCyan transition group">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 group-hover:text-fluxCyan"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
                </button>
                <button onclick="openSettings()" class="glass-input p-2 rounded-lg hover:border-fluxCyan transition group">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 group-hover:text-fluxCyan"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12a7.5 7.5 0 0015 0m-15 0a7.5 7.5 0 1115 0m-15 0H3m16.5 0H21m-1.5 0a7.5 7.5 0 11-15 0 7.5 7.5 0 0115 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12a7.5 7.5 0 11-15 0 7.5 7.5 0 0115 0zM12 9v6m3-3H9" /><circle cx="12" cy="12" r="2.5" /></svg>
                </button>
            </div>
        </div>
        
        <div class="flex justify-between items-center border-t border-white/5 pt-2 mt-1">
            <div id="auth-status" class="text-[9px] bg-fluxCyan/10 px-2 py-1 rounded text-fluxCyan font-mono tracking-widest uppercase border border-fluxCyan/30">BASIC MODE</div>
            <div id="sync-status" class="text-[9px] text-gray-400 font-mono flex items-center gap-1">System: Offline Ready</div>
        </div>
    </header>

    <div class="px-4 mb-4">
        <div class="overflow-x-auto pb-2 no-scrollbar relative">
            <nav class="flex gap-2 w-[180%] sm:w-[130%]">
                <button onclick="switchTab('tab-dash')" class="tab-btn flex-1 glass-panel py-3 rounded-lg font-bold text-[10px] text-gray-400 transition whitespace-nowrap" id="btn-dash">DASHBOARD</button>
                <button onclick="switchTab('tab-pos')" class="tab-btn flex-1 glass-panel py-3 rounded-lg font-bold text-[10px] text-gray-400 transition whitespace-nowrap active-tab" id="btn-pos">POS</button>
                <button onclick="switchTab('tab-crm')" class="tab-btn flex-1 glass-panel py-3 rounded-lg font-bold text-[10px] text-gray-400 transition whitespace-nowrap" id="btn-crm">CRM</button>
                <button onclick="switchTab('tab-555')" class="tab-btn flex-1 glass-panel py-3 rounded-lg font-bold text-[10px] text-gray-400 transition whitespace-nowrap" id="btn-555">555</button>
                <button onclick="switchTab('tab-inventory')" class="tab-btn flex-1 glass-panel py-3 rounded-lg font-bold text-[10px] text-gray-400 transition whitespace-nowrap" id="btn-inventory">STOK</button>
                <button onclick="switchTab('tab-lhdn')" class="tab-btn flex-1 glass-panel py-3 rounded-lg font-bold text-[10px] text-gray-400 transition whitespace-nowrap" id="btn-lhdn">LHDN</button>
                <button onclick="switchTab('tab-history')" class="tab-btn flex-1 glass-panel py-3 rounded-lg font-bold text-[10px] text-gray-400 transition whitespace-nowrap" id="btn-history">SEJARAH</button>
            </nav>
        </div>
    </div>

    <main class="px-4 pb-20">
        
        <div id="tab-dash" class="tab-content fade-in-up hidden">
            <div id="dashboard-container"></div>
            <div class="glass-panel p-5 rounded-xl mt-6">
                <h2 class="text-xs font-bold mb-4 opacity-70 uppercase tracking-widest text-lime">Data Kupon Diskaun</h2>
                <form id="kupon-form" class="space-y-3" onsubmit="event.preventDefault(); createNewKupon();">
                    <input type="text" id="kp-code" placeholder="Kod (cth: RAYA5)" class="glass-input p-3 rounded-lg w-full text-xs uppercase font-mono">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="kp-type" class="glass-input p-3 rounded-lg w-full text-xs">
                            <option value="PERCENT" class="bg-darkBg">Peratus (%)</option>
                            <option value="FIXED" class="bg-darkBg">Tetap (RM)</option>
                        </select>
                        <input type="number" id="kp-value" placeholder="Nilai" class="glass-input p-3 rounded-lg w-full text-xs font-mono">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="kp-min" placeholder="Min. Belanja" class="glass-input p-3 rounded-lg w-full text-xs font-mono">
                        <input type="number" id="kp-qty" placeholder="Had Kuantiti" class="glass-input p-3 rounded-lg w-full text-xs font-mono">
                    </div>
                    <button type="submit" id="btn-save-kupon" class="w-full bg-fluxCyan hover:bg-cyan-400 text-black py-3 rounded-lg font-bold text-[10px] uppercase tracking-widest">Execute Process</button>
                </form>
                <div id="kupon-manager-list" class="space-y-2 mt-4"></div>
            </div>
        </div>

        <div id="tab-pos" class="tab-content fade-in-up">
            <div class="flex flex-col gap-4">
                <div class="glass-panel p-4 rounded-xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-fluxPurple/20 text-fluxPurple border border-fluxPurple/30 text-[8px] px-2 py-1 rounded-bl-lg font-bold uppercase">Wajib Isi</div>
                    <p class="text-[10px] opacity-70 font-bold mb-3 uppercase tracking-widest text-gray-400">Data Pelanggan</p>
                    <div class="flex gap-2 mb-3">
                        <input type="number" id="pos-phone" placeholder="No. Tel (Mula dgn 6)" class="glass-input p-3 rounded-lg w-[60%] text-xs font-mono">
                        <button onclick="searchCustomer()" class="glass-input hover:bg-white/10 text-white px-3 rounded-lg text-xs font-bold w-[40%]">CARI 🔍</button>
                    </div>
                    <input type="text" id="pos-name" placeholder="Nama Pelanggan" class="glass-input p-3 rounded-lg w-full text-xs">
                </div>

                <div class="w-full">
                    <h2 class="text-[10px] mb-2 opacity-70 font-bold uppercase tracking-wider px-1 text-gray-400">Database Produk</h2>
                    <div id="pos-select-list" class="grid grid-cols-3 gap-2 max-h-[25vh] overflow-y-auto p-1 no-scrollbar"></div>
                </div>
                
                <div class="glass-panel p-5 w-full rounded-xl border border-fluxCyan/30 shadow-[0_0_15px_rgba(0,229,255,0.1)]">
                    <div class="mb-4 space-y-2 border-b border-white/10 pb-4">
                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Sistem Transaksi</p>
                        <select id="pos-payment-method" class="glass-input p-3 rounded-lg w-full text-xs font-bold text-white">
                            <option value="TUNAI" class="bg-darkBg">💵 TUNAI</option>
                            <option value="QR PAY" class="bg-darkBg">📱 QR PAY / E-WALLET</option>
                            <option value="TRANSFER" class="bg-darkBg">🏦 ONLINE TRANSFER</option>
                            <option value="HUTANG" class="bg-darkBg">📖 BUKU 555 (HUTANG)</option>
                        </select>
                        <div class="flex gap-2">
                            <input type="text" id="pos-kupon" placeholder="Kod Kupon" class="glass-input p-3 rounded-lg w-[70%] text-xs uppercase font-mono">
                            <button onclick="applyKupon()" class="bg-fluxPurple hover:bg-purple-600 text-white w-[30%] rounded-lg text-[10px] font-bold">TUNTUT</button>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-sm text-white">Troli Jualan</h2>
                        <span class="text-lime font-mono font-bold text-lg" id="next-bill-no-display">#1001</span>
                    </div>
                    <div id="cart-items" class="space-y-2 mb-4 min-h-[100px] max-h-[25vh] overflow-y-auto border-b border-white/10 pb-4 font-mono text-sm no-scrollbar"></div>
                    
                    <div class="flex justify-between mb-4 items-end text-white" id="total-price">
                        <span class="text-xs uppercase tracking-widest opacity-70 font-bold">Total:</span>
                        <span class="text-2xl font-bold font-mono text-lime drop-shadow-[0_0_8px_rgba(57,255,20,0.5)]">RM 0.00</span>
                    </div>

                    <div class="space-y-2">
                        <div class="grid grid-cols-2 gap-2 mt-4">
                            <button onclick="processTransaction('QUOTATION', 'PDF')" class="glass-input hover:border-fluxCyan text-white text-[10px] py-3 rounded-lg font-bold uppercase tracking-widest">Quotation</button>
                            <button onclick="processTransaction('INVOICE', 'PDF')" class="border border-fluxPurple text-fluxPurple hover:bg-fluxPurple/10 py-3 rounded-lg text-[10px] font-bold uppercase tracking-widest">Invoice</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <button onclick="processTransaction('RECEIPT', 'PDF')" class="bg-fluxCyan hover:bg-cyan-400 text-black text-[10px] py-3 rounded-lg font-bold uppercase tracking-widest flex items-center justify-center gap-2 shadow-[0_0_10px_rgba(0,229,255,0.4)]">📄 Jana PDF</button>
                            <button onclick="processTransaction('RECEIPT', 'BT')" class="bg-fluxPurple hover:bg-purple-600 text-white text-[10px] py-3 rounded-lg font-bold uppercase tracking-widest flex items-center justify-center gap-2 shadow-[0_0_10px_rgba(176,0,255,0.4)]">🖨️ Print BT</button>
                        </div>
                        <button onclick="cancelBill()" class="w-full text-[10px] opacity-50 py-3 mt-1 hover:text-orange transition text-gray-400 uppercase tracking-widest font-bold">Batalkan Proses</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-crm" class="tab-content fade-in-up hidden">
            <div class="glass-panel p-5 rounded-xl mb-6">
                <h2 class="text-xs font-bold mb-3 text-fluxCyan uppercase tracking-widest">Pusat Operasi WA Blast</h2>
                <textarea id="blast-msg" placeholder="Mesej anda... Guna [NAMA]" class="glass-input p-3 rounded-lg w-full text-xs h-24 mb-3"></textarea>
                <div class="flex gap-2 mb-4 items-center">
                    <input type="number" id="blast-delay" value="30" class="glass-input p-3 rounded-lg w-1/3 text-xs text-center font-mono">
                    <button onclick="startWABlast()" class="bg-fluxCyan text-black w-1/3 rounded-lg text-[10px] font-bold py-3">🚀 SEMI</button>
                    <button onclick="startTurboBlast()" class="bg-orange text-white w-1/3 rounded-lg text-[10px] font-bold py-3 shadow-[0_0_10px_rgba(255,87,34,0.3)]">🔥 TURBO</button>
                </div>
                <div id="blast-status-display" class="text-center text-[10px] text-gray-300 font-mono"></div>
            </div>
            <div id="crm-list" class="space-y-1"></div>
        </div>

        <div id="tab-555" class="tab-content fade-in-up hidden">
            <h2 class="text-[10px] font-bold mb-3 opacity-70 px-1 uppercase tracking-widest text-orange">Log Pemiutang (Buku 555)</h2>
            <div id="buku555-list" class="space-y-2"></div>
        </div>

        <div id="tab-inventory" class="tab-content fade-in-up hidden">
            <div class="glass-panel p-5 rounded-xl mb-6">
                <h2 class="text-[10px] font-bold mb-4 opacity-70 uppercase tracking-widest text-lime">Input Data Produk</h2>
                <form id="add-product-form" class="space-y-3">
                    <input type="text" id="p-name" placeholder="Nama Produk" class="glass-input p-3 rounded-lg w-full text-sm" required>
                    <textarea id="p-desc" placeholder="Penerangan" class="glass-input p-3 rounded-lg w-full text-sm h-16"></textarea>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="p-price" step="0.01" placeholder="Harga (RM)" class="glass-input p-3 rounded-lg w-full text-sm font-mono" required>
                        <input type="number" id="p-qty" placeholder="Kuantiti" class="glass-input p-3 rounded-lg w-full text-sm font-mono" required>
                    </div>
                    <input type="file" id="p-img" accept="image/*" class="text-[10px] w-full text-gray-400">
                    <button type="submit" id="btn-save-inv" class="w-full bg-fluxCyan text-black py-3 rounded-lg font-bold text-xs mt-2 uppercase tracking-widest">Sahkan Stok</button>
                </form>
            </div>
            <div id="inventory-list" class="pb-20"></div>
        </div>

        <div id="tab-lhdn" class="tab-content fade-in-up hidden">
            <div class="glass-panel p-5 rounded-xl mb-6">
                <h2 class="text-[10px] font-bold mb-4 opacity-70 uppercase tracking-widest text-lime">Log Perbelanjaan</h2>
                <form id="lhdn-expense-form" class="space-y-3" onsubmit="event.preventDefault(); saveNewExpense();">
                    <input type="text" id="exp-desc" placeholder="Item?" class="glass-input p-3 rounded-lg w-full text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" step="0.01" id="exp-amount" placeholder="RM" class="glass-input p-3 rounded-lg w-full text-sm font-mono">
                        <select id="exp-cat" class="glass-input p-3 rounded-lg w-full text-sm">
                            <option value="Bahan Mentah" class="bg-darkBg">Bahan Mentah</option>
                            <option value="Sewa" class="bg-darkBg">Sewa Premis</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-fluxCyan text-black py-3 rounded-lg font-bold text-[10px] uppercase tracking-widest mt-2">Simpan Kos</button>
                </form>
            </div>
            <div id="lhdn-expenses-list" class="mb-8"></div>
        </div>

        <div id="tab-history" class="tab-content fade-in-up hidden">
            <div class="glass-panel p-3 rounded-xl mb-6">
                <input type="text" id="history-search" oninput="filterHistory()" placeholder="Cari Rekod..." class="glass-input p-3 rounded-lg w-full text-xs font-mono">
            </div>
            <div id="history-list"></div>
        </div>
    </main>

    <div id="custom-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[9999] hidden flex items-center justify-center p-4">
        <div class="glass-panel border-fluxCyan/50 rounded-xl p-6 max-w-sm w-full text-center">
            <h3 class="text-sm font-bold text-white mb-2" id="custom-modal-title">Alert</h3>
            <p id="custom-modal-msg" class="text-xs text-gray-300 mb-4"></p>
            <input type="text" id="custom-modal-input" class="hidden glass-input p-3 rounded-lg w-full text-xs mb-4 text-center">
            <div class="flex gap-2 justify-center">
                <button id="custom-modal-cancel" class="flex-1 py-3 rounded-lg font-bold text-[10px] glass-input hidden">Batal</button>
                <button id="custom-modal-ok" class="flex-1 py-3 rounded-lg font-bold text-[10px] bg-fluxCyan text-black">Ok</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title> <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000; color: #00FF00; font-family: 'Courier New', monospace; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="border border-green-500/30 p-6 rounded-lg w-full max-w-sm bg-black/80 shadow-[0_0_20px_rgba(0,255,0,0.2)]">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold tracking-[0.2em]">KETICK_CORE_V2</h1>
            <p class="text-[9px] opacity-50 uppercase mt-1">Status: Encrypted // Authorization: Admin</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] uppercase mb-1 block text-green-700 font-bold">Select_Tier</label>
                <select id="pkg-name" class="w-full bg-black border border-green-500/50 rounded p-3 text-sm outline-none text-green-400">
                    <option value="BASIC">BASIC_TIER</option>
                    <option value="PRO">PRO_TIER</option>
                    <option value="PREMIUM">PREMIUM_TIER</option>
                    <option value="LEGEND">LEGEND_TIER</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] uppercase mb-1 block text-green-700 font-bold">Select_Duration</label>
                <select id="pkg-duration" class="w-full bg-black border border-green-500/50 rounded p-3 text-sm outline-none text-green-400">
                    <option value="30">MONTHLY (30 Days)</option>
                    <option value="365">YEARLY (365 Days)</option>
                    <option value="36500">LIFETIME (Permanent)</option>
                </select>
            </div>

            <button onclick="generateAdminKey()" class="w-full bg-green-900/40 hover:bg-green-800/60 border border-green-500 text-green-400 font-bold py-4 rounded text-xs transition mt-2 tracking-widest">
                [ EXECUTE_GENERATOR ]
            </button>

            <div id="result-box" class="hidden mt-4 pt-4 border-t border-green-500/30">
                <label class="text-[9px] uppercase mb-1 block text-center opacity-50 text-white">Generated_Hash</label>
                <textarea id="key-output" readonly class="w-full bg-black border border-green-500/50 rounded p-3 text-[11px] outline-none text-white h-24 text-center break-all font-mono"></textarea>
                <button onclick="copyKey()" class="w-full bg-green-600 hover:bg-green-500 text-black font-bold py-2 rounded text-[10px] mt-2 transition uppercase">
                    Copy_to_Clipboard
                </button>
            </div>
        </div>
    </div>

    <script>
        // LOGIK PENYAMARAN (Mesti sama dengan license.js)
        const KeyEngine = {
            _m: ['K3T1CK', 'bg-white', 'text-sm', '_RAHSIA', 'flex', 'p-4', '_2026', 'items-center'],
            _env: function() { return this._m[0] + this._m[3] + this._m[6]; },
            create: function(plan, days) {
                const x = new Date();
                x.setDate(x.getDate() + parseInt(days));
                const t = x.getTime(); 
                const py = `${plan}|${t}`;
                const sg = btoa(py + this._env()).substring(0, 12); 
                return btoa(`${py}|${sg}`); 
            }
        };

        function generateAdminKey() {
            const plan = document.getElementById('pkg-name').value;
            const days = document.getElementById('pkg-duration').value;
            
            const newKey = KeyEngine.create(plan, days);
            
            document.getElementById('result-box').classList.remove('hidden');
            document.getElementById('key-output').value = newKey;
        }

        function copyKey() {
            const copyText = document.getElementById("key-output");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("KEY_COPIED_SUCCESSFULLY");
        }
    </script>
</body>
</html>
